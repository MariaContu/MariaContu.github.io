<section id="home" class="hero">
  <div class="hero-content">
    <p class="eyebrow">{{ profile.headline }}</p>

    <h1>
      Oi, eu sou a
      <span>{{ profile.name }}.</span>
    </h1>

    <p class="description">
      {{ profile.summary }}
    </p>

    <p class="description secondary-description">
      {{ profile.focus }}
    </p>

    <div class="actions">
      <a class="button primary" href="#projects">Ver projetos</a>
      <a class="button secondary" [href]="'mailto:' + profile.email">Entrar em contato</a>
    </div>

    <div class="links" aria-label="Links profissionais">
      <a [href]="profile.linkedin" target="_blank" rel="noopener noreferrer"> LinkedIn </a>

      <a [href]="profile.github" target="_blank" rel="noopener noreferrer"> GitHub </a>
    </div>
  </div>

  <aside class="hero-card" aria-label="Resumo profissional">
    <div class="card-header">
      <span class="status-dot"></span>
      <span>{{ profile.availableText }}</span>
    </div>

    <div class="card-body">
      <p class="role">{{ profile.headline }}</p>
      <p class="location">{{ profile.location }}</p>

      <div class="stack">
        @for (item of profile.stack; track item) {
          <span>{{ item }}</span>
        }
      </div>
    </div>
  </aside>
</section>
